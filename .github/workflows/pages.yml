name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Build WASM
        run: wasm-pack build crates/semigroup_explorer --target web --out-dir ../../pkg
      - name: Stage site
        run: |
          mkdir -p _site/normaliz
          cp index.html strata.html style.css _site/
          cp -r jsmodules pkg _site/
          # Per-semigroup JSON exports consumed by the in-browser Pivot tab.
          # Other normaliz/ artefacts (Normaliz binaries, .in/.out files, etc.)
          # are intentionally excluded from the deployed site.
          cp normaliz/semigroup_g_from2to*_list.json _site/normaliz/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
