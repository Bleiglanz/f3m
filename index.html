<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 3, 5, 7" value="3, 5, 7" />
    <button id="compute-btn">Compute</button>
    <button id="random-btn">Random</button>
    <button id="random3f-btn">Random3f</button>
    <button id="random-primes-btn">RandomPrimes</button>
  </div>

  <div id="error"></div>
  <div id="result"></div>
  <div id="bottom-actions" style="margin-top:1.5rem;display:none;">
    <button id="add-f1-btn">add f</button>
  </div>

  <script type="module">
    import init, { js_compute, structure_table } from './pkg/f3m.js';

    await init();

    let currentF = null;
    let currentGenSet = null;

    function compute() {
      const raw = document.getElementById('gens').value.trim();
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errEl.style.display = 'none';
      resultEl.innerHTML = '';

      if (!raw) { return; }

      let s;
      try {
        s = js_compute(raw);
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
        errEl.style.display = 'block';
        return;
      }

      currentF = s.f;
      currentGenSet = Array.from(s.gen_set);
      document.getElementById('bottom-actions').style.display = 'block';

      // cache Vec getters — each call allocates a new Uint32Array from WASM
      const aperySet = s.apery_set;
      const genSetArr = s.gen_set;
      const blobs    = Array.from(s.blob);

      const isElement = x => x >= aperySet[x % s.m];
      const elements = Array.from({length: s.f + 1}, (_, x) => x).filter(isElement);
      const gaps     = Array.from({length: s.f},     (_, x) => x + 1).filter(x => !isElement(x));
      const blobSet  = new Set(blobs);

      const gens = new Set(genSetArr);

      function tipCell(value, tipText) {
        return `<td class="value has-tip">${value}<span class="tip">${tipText}</span></td>`;
      }

      const rows = [
        ['Embedding&nbsp;dimension&nbsp;(e)', `<td class="value">${s.e}</td>`],
        ['e&nbsp;-&nbsp;2m&nbsp;+&nbsp;g',   `<td class="value">${s.e - 2 * s.m + s.count_gap}</td>`],
        ['Frobenius number (f)',    `<td class="value"><span class="sg-frob">${s.f}</span></td>`],
        ['Multiplicity (m)',        `<td class="value">${s.m}</td>`],
        ['# elements ≤ f',         tipCell(s.count_set, elements.join(', '))],
        ['# gaps',                 tipCell(s.count_gap, gaps.join(', '))],
        ['# blobs=&nbsp;non-reflected&nbsp;gaps',              tipCell(blobs.length, blobs.join(', '))],
        ['Largest generator',      `<td class="value"><span class="sg-gen">${s.max_gen}</span></td>`],
        ['Generators',             `<td class="value">${Array.from(genSetArr, g => `<span class="sg-gen">${g}</span>`).join(', ')}</td>`],
        ['Apéry set',              `<td class="value apery-cell"><table class="apery-table"><tr>${Array.from(aperySet, (_, i) => `<th>${i}</th>`).join('')}</tr><tr>${Array.from(aperySet, v => { const c = v === s.f ? 'sg-frob' : gens.has(v) ? 'sg-gen' : 'sg-apery'; return `<td class="${c}">${v}</td>`; }).join('')}</tr></table></td>`],
        ['Structure', (() => {
          const m = s.m;
          const initD = m;
          const initI = Math.min(Math.floor((s.f + 1) / 2), initD);
          return `<td class="value sg-cell">` +
            `<div class="sg-slider-row">` +
              `<label>width: <span id="sg-gen-val">${initD}</span></label>` +
              `<input type="range" id="sg-gen-slider" min="${m}" max="${s.f + 2 * m}" value="${initD}">` +
            `</div>` +
            `<div class="sg-slider-row">` +
              `<label>offset: <span id="sg-offset-val">${initI}</span></label>` +
              `<input type="range" id="sg-offset" min="0" max="${initD}" value="${initI}">` +
            `</div>` +
            `<div id="sg-grid-container">${structure_table(s, initI, initD)}</div>` +
            `</td>`;
        })()],
      ];

      const tbody = rows.map(([label, cell]) =>
        `<tr><td class="label">${label}</td>${cell}</tr>`
      ).join('');

      resultEl.innerHTML = `
        <table>
          <thead><tr><th>Property</th><th>Value</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>`;

      let selectedD = s.m;

      function highlightGen() {
        document.querySelectorAll('.sg-grid td').forEach(td => {
          td.classList.toggle('sg-selected', parseInt(td.textContent) === selectedD);
        });
      }

      const slider = document.getElementById('sg-offset');
      if (slider) {
        slider.addEventListener('input', () => {
          document.getElementById('sg-offset-val').textContent = slider.value;
          document.getElementById('sg-grid-container').innerHTML = structure_table(s, parseInt(slider.value), selectedD);
          highlightGen();
        });
      }

      document.getElementById('sg-grid-container').addEventListener('click', e => {
        const td = e.target.closest('td');
        if (!td || (!td.classList.contains('sg-out') && !td.classList.contains('sg-blob'))) return;
        const val = parseInt(td.textContent);
        if (isNaN(val)) return;
        document.getElementById('gens').value = document.getElementById('gens').value.trim() + ', ' + val;
        compute();
        document.getElementById('gens').value = currentGenSet.join(', ');
      });

      const genSlider = document.getElementById('sg-gen-slider');
      if (genSlider) {
        highlightGen();
        genSlider.addEventListener('input', () => {
          selectedD = parseInt(genSlider.value);
          document.getElementById('sg-gen-val').textContent = selectedD;
          const newI = Math.min(Math.floor((s.f + 1) / 2), selectedD);
          slider.max = selectedD;
          slider.value = newI;
          document.getElementById('sg-offset-val').textContent = newI;
          document.getElementById('sg-grid-container').innerHTML = structure_table(s, newI, selectedD);
          highlightGen();
        });
      }
    }

    document.getElementById('random-btn').addEventListener('click', () => {
      const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
      document.getElementById('gens').value = nums.join(', ');
      compute();
    });

    document.getElementById('random3f-btn').addEventListener('click', () => {
      const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
      const tempS = js_compute(nums.join(', '));
      const m = tempS.m;
      const extra = Array.from({length: 3 * m + 1}, (_, i) => 3 * m + i);
      const combined = [...nums, ...extra];
      document.getElementById('gens').value = combined.join(', ');
      compute();
    });

    function isPrime(n) {
      if (n < 2) return false;
      for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
      return true;
    }

    document.getElementById('random-primes-btn').addEventListener('click', () => {
      const x = Math.floor(Math.random() * 41) + 10;
      const primes = Array.from({length: 5 * x + 1}, (_, i) => x + i).filter(isPrime);
      document.getElementById('gens').value = primes.join(', ');
      compute();
    });

    document.getElementById('add-f1-btn').addEventListener('click', () => {
      if (currentF === null) return;
      const raw = document.getElementById('gens').value.trim();
      document.getElementById('gens').value = raw + ', ' + currentF;
      compute();
      document.getElementById('gens').value = currentGenSet.join(', ');
    });

    document.getElementById('compute-btn').addEventListener('click', compute);
    document.getElementById('gens').addEventListener('keydown', e => {
      if (e.key === 'Enter') compute();
    });

    compute();
  </script>
</body>
</html>
