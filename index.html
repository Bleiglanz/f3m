<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 3, 5, 7" value="3, 5, 7" />
    <button id="compute-btn">Compute</button>
    <button id="random-btn">Random</button>
  </div>

  <div id="error"></div>
  <div id="result"></div>

  <script type="module">
    import init, { js_compute } from './pkg/f3m.js';

    await init();

    function compute() {
      const raw = document.getElementById('gens').value.trim();
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errEl.style.display = 'none';
      resultEl.innerHTML = '';

      if (!raw) { return; }

      let s;
      try {
        s = js_compute(raw);
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
        errEl.style.display = 'block';
        return;
      }

      // cache Vec getters — each call allocates a new Uint32Array from WASM
      const aperySet = s.apery_set;
      const genSetArr = s.gen_set;
      const blobs    = Array.from(s.blob);

      const isElement = x => x >= aperySet[x % s.m];
      const elements = Array.from({length: s.f + 1}, (_, x) => x).filter(isElement);
      const gaps     = Array.from({length: s.f},     (_, x) => x + 1).filter(x => !isElement(x));
      const blobSet  = new Set(blobs);

      const gens = new Set(genSetArr);
      function buildSgGrid(offset) {
        const m = s.m, numRows = Math.ceil(s.f / m) + 3;
        let html = '<table class="sg-grid">';
        html += '<thead><tr>' + Array.from({length: m}, (_, col) => `<th>${(offset + col) % m}</th>`).join('') + '</tr></thead>';
        html += '<tbody>';
        for (let row = numRows - 1; row >= 0; row--) {
          html += '<tr>';
          for (let col = 0; col < m; col++) {
            const residue = (offset + col) % m;
            const n = row * m + residue;
            const apery = n === aperySet[residue];
            const cls = n === s.f ? 'sg-frob' : gens.has(n) ? 'sg-gen' : apery ? 'sg-apery' : isElement(n) ? 'sg-in' : blobSet.has(n) ? 'sg-blob' : 'sg-out';
            html += `<td class="${cls}">${n}</td>`;
          }
          html += '</tr>';
        }
        html += '</tbody></table>';
        return html;
      }

      function tipCell(value, tipText) {
        return `<td class="value has-tip">${value}<span class="tip">${tipText}</span></td>`;
      }

      const rows = [
        ['Embedding&nbsp;dimension&nbsp;(e)', `<td class="value">${s.e}</td>`],
        ['Frobenius number (f)',    `<td class="value"><span class="sg-frob">${s.f}</span></td>`],
        ['Multiplicity (m)',        `<td class="value">${s.m}</td>`],
        ['# elements ≤ f',         tipCell(s.count_set, elements.join(', '))],
        ['# gaps',                 tipCell(s.count_gap, gaps.join(', '))],
        ['Blobs (b)',              tipCell(blobs.length, blobs.join(', '))],
        ['Largest generator',      `<td class="value"><span class="sg-gen">${s.max_gen}</span></td>`],
        ['Generators',             `<td class="value">${Array.from(genSetArr, g => `<span class="sg-gen">${g}</span>`).join(', ')}</td>`],
        ['Apéry set',              `<td class="value apery-cell"><table class="apery-table"><tr>${Array.from(aperySet, (_, i) => `<th>${i}</th>`).join('')}</tr><tr>${Array.from(aperySet, v => { const c = v === s.f ? 'sg-frob' : gens.has(v) ? 'sg-gen' : 'sg-apery'; return `<td class="${c}">${v}</td>`; }).join('')}</tr></table></td>`],
        ['Structure', (() => {
          const m = s.m;
          return `<td class="value sg-cell">` +
            `<div class="sg-slider-row">` +
              `<label>Start column (i): <span id="sg-offset-val">0</span></label>` +
              `<input type="range" id="sg-offset" min="0" max="${m - 1}" value="0"${m <= 1 ? ' disabled' : ''}>` +
            `</div>` +
            `<div id="sg-grid-container">${buildSgGrid(0)}</div>` +
            `</td>`;
        })()],
      ];

      const tbody = rows.map(([label, cell]) =>
        `<tr><td class="label">${label}</td>${cell}</tr>`
      ).join('');

      resultEl.innerHTML = `
        <table>
          <thead><tr><th>Property</th><th>Value</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>`;

      const slider = document.getElementById('sg-offset');
      if (slider) {
        slider.addEventListener('input', () => {
          document.getElementById('sg-offset-val').textContent = slider.value;
          document.getElementById('sg-grid-container').innerHTML = buildSgGrid(parseInt(slider.value));
        });
      }
    }

    document.getElementById('random-btn').addEventListener('click', () => {
      const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
      document.getElementById('gens').value = nums.join(', ');
      compute();
    });

    document.getElementById('compute-btn').addEventListener('click', compute);
    document.getElementById('gens').addEventListener('keydown', e => {
      if (e.key === 'Enter') compute();
    });

    compute();
  </script>
</body>
</html>
