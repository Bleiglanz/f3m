<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 3, 5, 7" value="3, 5, 7" />
    <button id="compute-btn">Compute</button>
    <button id="random-btn">Random</button>
    <button id="random3f-btn">Random3f</button>
    <button id="random-symmetric-btn">Symmetric</button>
    <button id="random-primes-btn">RandomPrimes</button>
  </div>

  <div id="busy-banner">Computing…</div>
  <div id="error"></div>
  <div id="result"></div>

  <script type="module">
    import init, { js_compute, structure_table, kunz_table } from './pkg/f3m.js';

    function showError(msg) {
      const errEl = document.getElementById('error');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    window.addEventListener('error', e => showError('JS error: ' + e.message));
    window.addEventListener('unhandledrejection', e => showError('Unhandled promise rejection: ' + e.reason));

    await init();

    let currentGenSet = null;
    let computing = false;

    function setBusy(b) {
      computing = b;
      document.getElementById('busy-banner').style.display = b ? 'block' : 'none';
    }

    function guardBusy() {
      if (!computing) return false;
      document.getElementById('busy-banner').classList.add('busy-flash');
      setTimeout(() => document.getElementById('busy-banner').classList.remove('busy-flash'), 300);
      return true;
    }

    function compute() {
      if (guardBusy()) return;
      const raw = document.getElementById('gens').value.trim();
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errEl.style.display = 'none';
      resultEl.innerHTML = '';

      if (!raw) { return; }

      setBusy(true);
      let s;
      try {
        s = js_compute(raw);
      } catch (e) {
        setBusy(false);
        showError('Error: ' + (e.message ?? e));
        return;
      }

      try {

      currentGenSet = Array.from(s.gen_set);

      // cache Vec getters — each call allocates a new Uint32Array from WASM
      const aperySet = s.apery_set;
      const genSetArr = s.gen_set;
      const blobs    = Array.from(s.blob);

      const isElement = x => x >= aperySet[x % s.m];
      const elements = Array.from({length: s.f + 1}, (_, x) => x).filter(isElement);
      const gaps     = Array.from({length: s.f},     (_, x) => x + 1).filter(x => !isElement(x));
      const blobSet  = new Set(blobs);

      const gens = new Set(genSetArr);

      function tipCell(value, tipText) {
        return `<td class="value has-tip">${value}<span class="tip">${tipText}</span></td>`;
      }

      const rows = [
        ['Embedding&nbsp;dimension&nbsp;(e)', `<td class="value">${s.e}</td>`],
        ['e&nbsp;+&nbsp;g&nbsp;-&nbsp;m&nbsp;-&nbsp;a2;', `<td class="value">${s.e + s.count_gap - s.m - genSetArr[1]}</td>`],
        ['Frobenius number (f)',    `<td class="value"><span class="sg-frob">${s.f}</span></td>`],
        ['PF(S)',                   `<td class="value">${Array.from(s.pf, x => `<span class="sg-pf">${x}</span>`).join(', ')}</td>`],
        ['Type&nbsp;t',            `<td class="value">${s.type_t}</td>`],
        ['Symmetric?',             `<td class="value">${s.count_gap === s.count_set ? 'True' : 'False'}</td>`],
        ['Multiplicity (m)',        `<td class="value">${s.m}</td>`],
        ['# elements ≤ f',         tipCell(s.count_set, elements.join(', '))],
        ['# gaps',                 tipCell(s.count_gap, gaps.join(', '))],
        ['# reflected&nbsp;gaps',  tipCell(blobs.length, blobs.join(', '))],
        ['Largest generator',      `<td class="value"><span class="sg-gen">${s.max_gen}</span></td>`],
        ['Generators',             `<td class="value">${Array.from(genSetArr, g => `<span class="sg-gen" data-remove-gen="${g}">${g}</span>`).join(', ')}</td>`],
        ['Apéry set',              `<td class="value apery-cell"><div class="scroll-x"><table class="apery-table"><tr>${Array.from(aperySet, (_, i) => `<th>${i}</th>`).join('')}</tr><tr>${Array.from(aperySet, v => { const c = v === s.f ? 'sg-frob' : gens.has(v) ? 'sg-gen' : 'sg-apery'; return `<td class="${c}">${v}</td>`; }).join('')}</tr></table></div></td>`],
        ['Structure', (() => {
          const m = s.m;
          const initD = m;
          const initI = Math.min(Math.floor((s.f + 1) / 2), initD);
          return `<td class="value sg-cell">` +
            `<div class="sg-slider-row">` +
              `<label>width: <span id="sg-gen-val">${initD}</span></label>` +
              `<input type="range" id="sg-gen-slider" min="${m}" max="${s.f + 2 * m}" value="${initD}">` +
            `</div>` +
            `<div class="sg-slider-row">` +
              `<label>offset: <span id="sg-offset-val">${initI}</span></label>` +
              `<input type="range" id="sg-offset" min="0" max="${initD}" value="${initI}">` +
            `</div>` +
            `<div id="sg-grid-container">${structure_table(s, initI, initD)}</div>` +
            `</td>`;
        })()],
      ];

      rows.push(['<span class="has-tip">c<sub>ij</sub><span class="tip">apery(i) + apery(j) − apery((i+j) mod m) / m</span></span>', `<td class="value"><div class="scroll-x">${kunz_table(s)}</div></td>`]);

      const tbody = rows.map(([label, cell]) =>
        `<tr><td class="label">${label}</td>${cell}</tr>`
      ).join('');

      resultEl.innerHTML = `
        <table>
          <thead><tr><th>Property</th><th>Value</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>`;

      let selectedD = s.m;

      function highlightGen() {
        document.querySelectorAll('.sg-grid td').forEach(td => {
          td.classList.toggle('sg-selected', parseInt(td.textContent) === selectedD);
        });
      }

      const slider = document.getElementById('sg-offset');
      if (slider) {
        slider.addEventListener('input', () => {
          document.getElementById('sg-offset-val').textContent = slider.value;
          document.getElementById('sg-grid-container').innerHTML = structure_table(s, parseInt(slider.value), selectedD);
          highlightGen();
        });
      }

      const genSlider = document.getElementById('sg-gen-slider');
      if (genSlider) {
        highlightGen();
        genSlider.addEventListener('input', () => {
          selectedD = parseInt(genSlider.value);
          document.getElementById('sg-gen-val').textContent = selectedD;
          const newI = Math.min(Math.floor((s.f + 1) / 2), selectedD);
          slider.max = selectedD;
          slider.value = newI;
          document.getElementById('sg-offset-val').textContent = newI;
          document.getElementById('sg-grid-container').innerHTML = structure_table(s, newI, selectedD);
          highlightGen();
        });
      }
      } catch (e) {
        showError('Error: ' + (e.message ?? e));
      } finally {
        setBusy(false);
      }
    }

    // Registered once — no stacking on repeated compute() calls
    document.getElementById('result').addEventListener('click', e => {
      if (guardBusy()) return;
      const span = e.target.closest('span.sg-frob, span.sg-pf');
      if (!span) return;
      const val = parseInt(span.textContent);
      if (isNaN(val)) return;
      document.getElementById('gens').value = document.getElementById('gens').value.trim() + ', ' + val;
      compute();
      document.getElementById('gens').value = currentGenSet.join(', ');
    });

    document.getElementById('result').addEventListener('click', e => {
      if (guardBusy()) return;
      const span = e.target.closest('span[data-remove-gen]');
      if (!span) return;
      const val = parseInt(span.dataset.removeGen);
      if (isNaN(val)) return;
      const remaining = currentGenSet.filter(g => g !== val);
      if (remaining.length === 0) return;
      document.getElementById('gens').value = remaining.join(', ');
      compute();
    });

    document.getElementById('result').addEventListener('click', e => {
      if (guardBusy()) return;
      const td = e.target.closest('td');
      if (!td || (!td.classList.contains('sg-out') && !td.classList.contains('sg-blob') && !td.classList.contains('sg-pf') && !td.classList.contains('sg-frob'))) return;
      const val = parseInt(td.textContent);
      if (isNaN(val)) return;
      document.getElementById('gens').value = document.getElementById('gens').value.trim() + ', ' + val;
      compute();
      document.getElementById('gens').value = currentGenSet.join(', ');
    });

    document.getElementById('random-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
      document.getElementById('gens').value = nums.join(', ');
      compute();
    });

    document.getElementById('random3f-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
      const tempS = js_compute(nums.join(', '));
      const m = tempS.m;
      const extra = Array.from({length: 3 * m + 1}, (_, i) => 3 * m + i);
      const combined = [...nums, ...extra];
      document.getElementById('gens').value = combined.join(', ');
      compute();
    });

    document.getElementById('random-symmetric-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      for (let attempt = 0; attempt < 10000; attempt++) {
        const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
        const tempS = js_compute(nums.join(', '));
        if (tempS.is_symmetric) {
          document.getElementById('gens').value = nums.join(', ');
          compute();
          return;
        }
      }
      showError('Could not find a symmetric semigroup after 10000 attempts.');
    });

    function isPrime(n) {
      if (n < 2) return false;
      for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
      return true;
    }

    document.getElementById('random-primes-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      const x = Math.floor(Math.random() * 48) + 3;
      const primes = Array.from({length: 5 * x + 1}, (_, i) => x + i).filter(isPrime);
      document.getElementById('gens').value = primes.join(', ');
      compute();
    });

    document.getElementById('compute-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      compute();
    });
    document.getElementById('gens').addEventListener('keydown', e => {
      if (e.key === 'Enter') { if (guardBusy()) return; compute(); }
    });

    compute();
  </script>
</body>
</html>
