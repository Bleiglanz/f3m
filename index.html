<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 3, 5, 7" value="3, 5, 7" />
    <button id="compute-btn">Compute</button>
    <button id="random-btn">Random</button>
  </div>

  <div id="error"></div>
  <div id="result"></div>

  <script type="module">
    import init, { js_semigroup } from './pkg/f3m.js';

    await init();

    function compute() {
      const raw = document.getElementById('gens').value.trim();
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errEl.style.display = 'none';
      resultEl.innerHTML = '';

      if (!raw) { return; }

      let s;
      try {
        s = JSON.parse(js_semigroup(raw));
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
        errEl.style.display = 'block';
        return;
      }

      const isElement = x => x >= s.apery_set[x % s.m];
      const elements = Array.from({length: s.f + 1}, (_, x) => x).filter(isElement);
      const gaps     = Array.from({length: s.f},     (_, x) => x + 1).filter(x => !isElement(x));

      function tipCell(value, tipText) {
        return `<td class="value has-tip">${value}<span class="tip">${tipText}</span></td>`;
      }

      const rows = [
        ['Embedding&nbsp;dimension&nbsp;(e)', `<td class="value">${s.e}</td>`],
        ['Frobenius number (f)',    `<td class="value">${s.f}</td>`],
        ['Multiplicity (m)',        `<td class="value">${s.m}</td>`],
        ['# elements ≤ f',         tipCell(s.count_set, elements.join(', '))],
        ['# gaps',                 tipCell(s.count_gap, gaps.join(', '))],
        ['Largest generator',      `<td class="value">${s.max_gen}</td>`],
        ['Generators',             `<td class="value">${s.gen_set.join(', ')}</td>`],
        ['Apéry set',              `<td class="value apery-cell"><table class="apery-table"><tr>${s.apery_set.map((_, i) => `<th>${i}</th>`).join('')}</tr><tr>${s.apery_set.map(v => `<td>${v}</td>`).join('')}</tr></table></td>`],
        ['Structure', (() => {
          const m = s.m, numRows = Math.ceil(s.f / m) + 3;
          const gens = new Set(s.gen_set);
          let html = '<td class="value sg-cell"><table class="sg-grid">';
          html += '<thead><tr>' + Array.from({length: m}, (_, i) => `<th>${i}</th>`).join('') + '</tr></thead>';
          html += '<tbody>';
          for (let row = numRows - 1; row >= 0; row--) {
            html += '<tr>';
            for (let col = 0; col < m; col++) {
              const n = row * m + col;
              const apery = n === s.apery_set[col];
              const cls = n === s.f ? 'sg-frob' : gens.has(n) ? 'sg-gen' : apery ? 'sg-apery' : isElement(n) ? 'sg-in' : 'sg-out';
              html += `<td class="${cls}">${n}</td>`;
            }
            html += '</tr>';
          }
          html += '</tbody></table></td>';
          return html;
        })()],
      ];

      const tbody = rows.map(([label, cell]) =>
        `<tr><td class="label">${label}</td>${cell}</tr>`
      ).join('');

      resultEl.innerHTML = `
        <table>
          <thead><tr><th>Property</th><th>Value</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>`;
    }

    document.getElementById('random-btn').addEventListener('click', () => {
      const nums = Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
      document.getElementById('gens').value = nums.join(', ');
      compute();
    });

    document.getElementById('compute-btn').addEventListener('click', compute);
    document.getElementById('gens').addEventListener('keydown', e => {
      if (e.key === 'Enter') compute();
    });

    compute();
  </script>
</body>
</html>
