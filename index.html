<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #555; }

    button {
      padding: 0.6rem 1.2rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #444; }

    #error {
      color: #c00;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }

    #result { width: 100%; max-width: 600px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 0.65rem 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #222;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }

    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #fafafa; }

    td.label { color: #555; font-size: 0.9rem; width: 55%; }
    td.value { font-family: monospace; font-size: 0.95rem; }

    .has-tip {
      position: relative;
      cursor: help;
      text-decoration: underline dotted #aaa;
    }

    .has-tip .tip {
      display: none;
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      z-index: 10;
      background: #111;
      color: #f0f0f0;
      font-size: 0.82rem;
      font-family: monospace;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      white-space: normal;
      word-break: break-all;
      max-width: 420px;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .has-tip:hover .tip { display: block; }
  </style>
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 3, 5, 7" value="3, 5, 7" />
    <button id="compute-btn">Compute</button>
  </div>

  <div id="error"></div>
  <div id="result"></div>

  <script type="module">
    import init, { js_semigroup } from './pkg/f3m.js';

    await init();

    function compute() {
      const raw = document.getElementById('gens').value.trim();
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errEl.style.display = 'none';
      resultEl.innerHTML = '';

      if (!raw) { return; }

      let s;
      try {
        s = JSON.parse(js_semigroup(raw));
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
        errEl.style.display = 'block';
        return;
      }

      const isElement = x => x >= s.apery_set[x % s.m];
      const elements = Array.from({length: s.f + 1}, (_, x) => x).filter(isElement);
      const gaps     = Array.from({length: s.f},     (_, x) => x + 1).filter(x => !isElement(x));

      function tipCell(value, tipText) {
        return `<td class="value has-tip">${value}<span class="tip">${tipText}</span></td>`;
      }

      const rows = [
        ['Embedding dimension (e)', `<td class="value">${s.e}</td>`],
        ['Frobenius number (f)',    `<td class="value">${s.f}</td>`],
        ['Multiplicity (m)',        `<td class="value">${s.m}</td>`],
        ['# elements ≤ f',         tipCell(s.count_set, elements.join(', '))],
        ['# gaps',                 tipCell(s.count_gap, gaps.join(', '))],
        ['Largest generator',      `<td class="value">${s.max_gen}</td>`],
        ['Generators',             `<td class="value">${s.gen_set.join(', ')}</td>`],
        ['Apéry set',              `<td class="value">${s.apery_set.join(', ')}</td>`],
      ];

      const tbody = rows.map(([label, cell]) =>
        `<tr><td class="label">${label}</td>${cell}</tr>`
      ).join('');

      resultEl.innerHTML = `
        <table>
          <thead><tr><th>Property</th><th>Value</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>`;
    }

    document.getElementById('compute-btn').addEventListener('click', compute);
    document.getElementById('gens').addEventListener('keydown', e => {
      if (e.key === 'Enter') compute();
    });

    compute();
  </script>
</body>
</html>
