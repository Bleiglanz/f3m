<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 6,9,20" value="6, 9, 20" />
    <button id="compute-btn">Compute</button>
    <button id="random-btn">Random</button>
    <button id="random3f-btn">Random3f</button>
    <button id="random-symmetric-btn">Symmetric</button>
    <button id="random-primes-btn">RandomPrimes</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="s">S</button>
    <button class="tab-btn" data-tab="history">History</button>
    <button class="tab-btn" data-tab="gapgraph">Graph</button>
  </div>

  <div id="busy-banner">Computing…</div>
  <div id="error"></div>

  <div id="tab-s" class="tab-content active">
    <div id="result"></div>
  </div>

  <div id="tab-gapgraph" class="tab-content">
    <table class="history-table" style="width:100%">
      <thead><tr>
        <th>m</th><th>f</th><th>e</th><th>g</th><th>c-g</th><th>t</th><th>Sym</th>
        <th>gen</th><th>PF</th><th>SPF</th>
      </tr></thead>
      <tbody>
        <tr id="graph-prop-row"><td colspan="10"></td></tr>
        <tr><td colspan="10"><label>Upto <input type="range" id="graph-upto" min="0" max="0" value="0"> <span id="graph-upto-val"></span></label></td></tr>
        <tr id="graph-row"><td colspan="10"><div id="graph-vis" style="width:100%;height:400px;border:1px solid #ccc"></div></td></tr>
        <tr><td colspan="10"><textarea id="graph-edges-text" rows="6" style="width:100%;font-family:monospace" readonly></textarea></td></tr>
      </tbody>
    </table>
    <div id="gapgraph-container"></div>
  </div>

  <div id="tab-history" class="tab-content">
    <table class="history-table">
      <thead><tr>
        <th>#</th><th>m</th><th>f</th><th>e</th><th>g</th><th>c-g</th><th>t</th><th>Sym</th>
        <th>gen</th><th>PF</th><th>SPF</th><th>expr</th><th>value</th>
      </tr></thead>
      <tbody id="history-tbody"></tbody>
      <tfoot><tr><td colspan="13"><button id="gap-copy-btn">Copy</button><pre id="history-gap"></pre></td></tr></tfoot>
    </table>
  </div>

  <script type="module">
    import init, { js_compute, combined_table, shortprop, shortprop_tds, eval_expr, js_gap_block, js_graph_edges_text, js_node_class, js_graph_node_ids, js_graph_edge_pairs } from './pkg/f3m.js';

    function showError(msg) {
      const errEl = document.getElementById('error');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    window.addEventListener('error', e => showError('JS error: ' + e.message));
    window.addEventListener('unhandledrejection', e => showError('Unhandled promise rejection: ' + e.reason));

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
    }
    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

    document.getElementById('gap-copy-btn').addEventListener('click', () => {
      const text = document.getElementById('history-gap').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('gap-copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    });

    await init();

    const CLS_COLOR = {
      'sg-gen':   { background: '#7ab3e8', border: '#4a83b8' },
      'sg-apery': { background: '#1a5fb4', border: '#0f3d7a' },
      'sg-frob':  { background: '#ffcccc', border: '#cc8888' },
      'sg-pf':    { background: '#2d6a2d', border: '#1a3d1a' },
      'sg-blob':  { background: '#b8e6b8', border: '#78b678' },
      'sg-in':    { background: '#111',    border: '#444'    },
      'sg-out':   { background: '#f9f9f9', border: '#ccc'    },
    };
    function nodeColor(cls) {
      const c = CLS_COLOR[cls] ?? { background: '#f9f9f9', border: '#ccc' };
      return { background: c.background, border: c.border, highlight: { background: c.background, border: '#ff6600' } };
    }
    function visNode(s, n) {
      const cls = s ? js_node_class(s, n) : 'sg-out';
      return { id: n, label: String(n), color: nodeColor(cls) };
    }

    const graphNodes = new vis.DataSet([]);
    const graphEdges = new vis.DataSet([]);
    const graphNetwork = new vis.Network(
      document.getElementById('graph-vis'),
      { nodes: graphNodes, edges: graphEdges },
      { edges: { arrows: 'to' } }
    );

    function rebuildGraph(s, upto) {
      const nodeIds = js_graph_node_ids(s, upto);
      const edgePairs = js_graph_edge_pairs(s, upto);
      graphNodes.clear();
      graphEdges.clear();
      graphNodes.add(Array.from(nodeIds).map(n => visNode(s, n)));
      for (let i = 0; i < edgePairs.length; i += 2)
        graphEdges.add({ from: edgePairs[i], to: edgePairs[i + 1] });
    }

    document.getElementById('graph-upto').addEventListener('input', function() {
      const upto = Number(this.value);
      document.getElementById('graph-upto-val').textContent = upto;
      if (currentS) {
        document.getElementById('graph-edges-text').value = js_graph_edges_text(currentS, upto);
        rebuildGraph(currentS, upto);
      }
    });

    let currentGenSet = null;
    let currentS = null;
    let evaExpr = 'f+1';
    let computing = false;
    const busyBanner = document.getElementById('busy-banner');
    const historyList = [];

    function historyRow(s, idx, expr, value) {
      const valStr = value ?? '—';
      return `<tr class="history-row" data-idx="${idx}"><td>${idx}</td>${shortprop_tds(s)}<td class="left">${expr}</td><td>${valStr}</td></tr>`;
    }

    document.getElementById('history-tbody').addEventListener('click', e => {
      const row = e.target.closest('.history-row');
      if (!row) return;
      const s = historyList[parseInt(row.dataset.idx)];
      gensInput.value = Array.from(s.gen_set).join(', ');
      switchTab('s');
      render(s);
    });

    function setBusy(b) {
      computing = b;
      busyBanner.style.display = b ? 'block' : 'none';
    }

    function guardBusy() {
      if (!computing) return false;
      busyBanner.classList.add('busy-flash');
      setTimeout(() => busyBanner.classList.remove('busy-flash'), 300);
      return true;
    }

    const gensInput = document.getElementById('gens');

    function render(s) {
      currentGenSet = Array.from(s.gen_set);
      currentS = s;
      historyList.push(s);
      document.getElementById('history-tbody').innerHTML += historyRow(s, historyList.length - 1, evaExpr, eval_expr(evaExpr, s));
      const GAP_HEADER = '# Generated by f3m — paste into GAP or run with \'gap <file>\'\n# Requires: LoadPackage("NumericalSgps");\n\nLoadPackage("NumericalSgps");;\n\n';
      const GAP_FOOTER = 'Print("All assertions passed.\\n");\n';
      document.getElementById('history-gap').textContent = GAP_HEADER + historyList.map((s, i) => js_gap_block(s, i + 1)).join('') + GAP_FOOTER;
      document.getElementById('graph-prop-row').innerHTML = shortprop_tds(s);
      const graphUpto = document.getElementById('graph-upto');
      graphUpto.min = s.m;
      graphUpto.max = s.f + s.m;
      graphUpto.value = s.m;
      document.getElementById('graph-upto-val').textContent = s.m;
      document.getElementById('graph-edges-text').value = js_graph_edges_text(s, s.m);
      rebuildGraph(s, s.m);

      // cache Vec getters — each call allocates a new Uint32Array from WASM
      const aperySet = s.apery_set;
      const genSetArr = s.gen_set;
      const blobs    = Array.from(s.blob);
      const pfArr    = Array.from(s.pf);

      const isElement = x => x >= aperySet[x % s.m];
      const elements = Array.from({length: s.f + 1}, (_, x) => x).filter(isElement);
      const gaps     = Array.from({length: s.f},     (_, x) => x + 1).filter(x => !isElement(x));

      function tipCell(value, tipText) {
        return `<td class="value has-tip">${value}<span class="tip">${tipText}</span></td>`;
      }

      const rows = [
        `<tr><td colspan="2" class="shortprop-cell">${shortprop(s)}</td></tr>`,
        ['Wilf&nbsp;sporadic/(f+1)',                   `<td class="value">${s.wilf.toFixed(4)} &gt;= ${(1/s.e).toFixed(4)}</td>`],
        ['Embedding&nbsp;dimension&nbsp;(e)', `<td class="value">${s.e}</td>`],
         ['Frobenius number (f)',    `<td class="value"><span class="sg-frob">${s.f}</span></td>`],
        ['PF(S)',                   `<td class="value">${pfArr.map(x => `<span class="sg-pf">${x}</span>`).join(', ')}</td>`],
        ['Special&nbsp;PF',        `<td class="value">${Array.from(s.special_pf, x => `<span class="sg-pf">${x}</span>`).join(', ')}</td>`],
        [`<input type="text" id="eva-input" value="${evaExpr}" style="width:100%" title="Ops: + - * /  (integer)&#10;e=emb.dim  g=gaps  f=Frobenius  t=type  m=mult&#10;Q=largest gen  A=max Apéry (f+m)&#10;a[i]=Apéry[i]  q[i]=generator[i]">`,
         `<td class="value" id="eva-result">${eval_expr(evaExpr, s) ?? '—'}</td>`],
        ['# reflected&nbsp;gaps',  tipCell(blobs.length, blobs.join(', '))],
        ['Largest generator (ae)',      `<td class="value"><span class="sg-gen">${s.max_gen}</span></td>`],
        ['Structure / <span class="has-tip">c<sub>ij</sub><span class="tip">apery(i) + apery(j) − apery((i+j) mod m) / m</span></span>', (() => {
          const m = s.m;
          const initI = 0;
          return `<td class="value sg-cell">` +
            `<div class="sg-slider-row">` +
              `<label>offset: <span id="sg-offset-val">${initI}</span></label>` +
              `<input type="range" id="sg-offset" min="0" max="${m - 1}" value="${initI}">` +
            `</div>` +
            `<div id="sg-grid-container"></div>` +
            `</td>`;
        })()],
      ];

      const tbody = rows.map(row =>
        typeof row === 'string' ? row : `<tr><td class="label">${row[0]}</td>${row[1]}</tr>`
      ).join('');

      const resultEl = document.getElementById('result');
      resultEl.innerHTML = `
        <table>
          <tbody>${tbody}</tbody>
        </table>`;

      document.getElementById('eva-input').addEventListener('input', e => {
        evaExpr = e.target.value;
        const result = eval_expr(evaExpr, s);
        document.getElementById('eva-result').textContent = result ?? '—';
      });

      const slider = document.getElementById('sg-offset');
      if (slider) {
        const renderGrid = () => {
          document.getElementById('sg-grid-container').innerHTML = combined_table(s, parseInt(slider.value));
        };
        renderGrid();
        slider.addEventListener('input', () => {
          document.getElementById('sg-offset-val').textContent = slider.value;
          renderGrid();
        });
      }
    }

    function compute() {
      if (guardBusy()) return;
      const raw = gensInput.value.trim();
      const errEl = document.getElementById('error');

      errEl.style.display = 'none';
      document.getElementById('result').innerHTML = '';

      if (!raw) { return; }

      // Sort and normalise the input display
      const sorted = raw.split(',').map(t => parseInt(t.trim())).filter(n => !isNaN(n)).sort((a, b) => a - b);
      gensInput.value = sorted.join(', ');

      setBusy(true);
      try {
        render(js_compute(raw));
      } catch (e) {
        showError('Error: ' + (e.message ?? e));
      } finally {
        setBusy(false);
      }
    }

    function doToggle(val) {
      if (!currentS) return;
      const newS = currentS.toggle(val);
      const newGens = Array.from(newS.gen_set);
      if (newGens.length === 0 || newGens.join(',') === currentGenSet.join(',')) return;
      gensInput.value = newGens.join(', ');
      render(newS);
    }

    // Single toggle handler: grid cells with data-n and property spans
    document.getElementById('result').addEventListener('click', e => {
      if (guardBusy()) return;
      const span = e.target.closest('span.sg-frob, span.sg-pf, span.sg-gen, span[data-remove-gen]');
      if (span) { doToggle(parseInt(span.textContent)); return; }
      const sgSpan = e.target.closest('.sg-grid span[data-n]');
      if (sgSpan) doToggle(parseInt(sgSpan.dataset.n));
    });

    function randNums() {
      return Array.from({length: 8}, () => Math.floor(Math.random() * 91) + 10);
    }

    document.getElementById('random-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      gensInput.value = randNums().join(', ');
      compute();
    });

    document.getElementById('random3f-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      const nums = randNums();
      const tempS = js_compute(nums.join(', '));
      const m = tempS.m;
      const extra = Array.from({length: 3 * m + 1}, (_, i) => 3 * m + i);
      const combined = [...nums, ...extra];
      gensInput.value = combined.join(', ');
      compute();
    });

    document.getElementById('random-symmetric-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      for (let attempt = 0; attempt < 10000; attempt++) {
        const nums = randNums();
        const tempS = js_compute(nums.join(', '));
        if (tempS.is_symmetric) {
          gensInput.value = nums.join(', ');
          compute();
          return;
        }
      }
      showError('Could not find a symmetric semigroup after 10000 attempts.');
    });

    function isPrime(n) {
      if (n < 2) return false;
      for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
      return true;
    }

    document.getElementById('random-primes-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      const x = Math.floor(Math.random() * 48) + 3;
      const primes = Array.from({length: 5 * x + 1}, (_, i) => x + i).filter(isPrime);
      gensInput.value = primes.join(', ');
      compute();
    });

    document.getElementById('compute-btn').addEventListener('click', () => {
      if (guardBusy()) return;
      compute();
    });
    gensInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { if (guardBusy()) return; compute(); }
    });

    compute();
  </script>
  <footer><a href="https://github.com/Bleiglanz/f3m#readme" target="_blank">README</a></footer>
</body>
</html>
