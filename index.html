<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerical Semigroup Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/lines/LineSegmentsGeometry.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/lines/LineGeometry.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/lines/LineMaterial.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/lines/LineSegments2.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/lines/Line2.js"></script>
</head>
<body>
  <h1>Numerical Semigroup Calculator</h1>
  <p class="subtitle">Enter a comma-separated list of generators</p>

  <div class="input-row">
    <input type="text" id="gens" placeholder="e.g. 6,9,20" value="6, 9, 20" />
    <button id="compute-btn">Compute</button>
    <button id="random-btn">Random</button>
    <button id="random3f-btn">Random3f</button>
    <button id="random-symmetric-btn">Symmetric</button>
    <button id="random-primes-btn">RandomPrimes</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="s">S</button>
    <button class="tab-btn" data-tab="history">History</button>
    <button class="tab-btn" data-tab="graph">Graph</button>
    <button class="tab-btn" data-tab="gapgraph">3dview</button>
    <button class="tab-btn" data-tab="gap">Gap</button>
  </div>

  <div id="busy-banner">Computing…</div>
  <div id="error"></div>

  <div id="tab-s" class="tab-content active">
    <div id="result"></div>
  </div>

  <div id="tab-graph" class="tab-content">
    <table class="history-table" style="width:100%">
      <thead></thead>
      <tbody id="graph-prop-tbody"></tbody>
      <tbody>
        <tr><td colspan="14">
          <label>Upto <input type="range" id="graph-upto" min="0" max="0" value="0"> <span id="graph-upto-val"></span></label>
          &nbsp;&nbsp;
          <label><input type="checkbox" id="graph-show-gaps" checked> Show gaps</label>
          &nbsp;&nbsp;
          <label><input type="checkbox" id="graph-show-s" checked> Show S</label>
        </td></tr>
        <tr id="graph-row"><td colspan="14">
          <div id="graph-resize-wrapper" style="width:400px;resize:horizontal;overflow:auto;display:inline-block;max-width:100%">
            <div id="graph-vis" style="width:100%;height:400px;border:1px solid #ccc;overflow:hidden"></div>
            <textarea id="graph-edges-text" rows="3" style="width:100%;box-sizing:border-box;font-family:monospace;resize:none" readonly></textarea>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div id="tab-gapgraph" class="tab-content">
    <div id="sg-3d-container" style="width:100%;height:500px"></div>
  </div>

  <div id="tab-history" class="tab-content">
    <table class="history-table">
      <thead></thead>
      <tbody id="history-tbody"></tbody>
    </table>
  </div>

  <div id="tab-gap" class="tab-content">
    <button id="gap-copy-btn">Copy</button>
    <pre id="history-gap"></pre>
  </div>

  <script type="module" src="jsmodules/app.js"></script>
  <footer><a href="https://github.com/Bleiglanz/f3m#readme" target="_blank">README</a></footer>
</body>
</html>
