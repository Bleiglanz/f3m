<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Strata Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <header>
      <h1>Strata Explorer</h1>
      <p class="subtitle">Random monotonic chains M<sub>0</sub> &sube; M<sub>1</sub> &sube; &hellip; &sube; M<sub>lmax</sub> &sube; {1, &hellip;, N}.
        Click a cell to toggle membership &mdash; adding cascades up, removing cascades down.</p>
      <div class="input-row">
        <label>N <input type="number" id="strata-n" min="1" max="40" value="10" inputmode="numeric"></label>
        <label>lmax <input type="number" id="strata-lmax" min="0" max="20" value="5" inputmode="numeric"></label>
        <label>m <input type="number" id="strata-m" min="2" max="999" value="5" inputmode="numeric" title="Row stride / multiplicity. Must satisfy m > N — values that don't are silently clamped to N+1. Initial value matches lmax."></label>
        <button id="strata-compute" title="Build an empty chain of the given size" aria-label="Compute">&#x23CE;</button>
        <button id="strata-rnd1" title="Random monotonic chain (M₁ a random subset, then random additions per step)">Rnd1</button>
        <a href="index.html" class="strata-back" title="Back to the semigroup calculator">&larr; semigroup</a>
      </div>
    </header>

    <div class="body">
      <main>
        <div id="error"></div>
        <div class="strata-pane">
          <div id="strata-out" class="table-wrap"></div>
          <div class="strata-sg-side">
            <div class="strata-sg-caption">&lang;m, w<sub>j</sub>, lmax+N+1, lmax+N+2, &hellip;&rang;</div>
            <div id="strata-sg-out" class="table-wrap"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="jsmodules/strata.js"></script>
</body>
</html>
